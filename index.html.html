
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pipeline des Opportunités Public — Phases et structure de travail</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--card-width:205px;--phase-header-height:78px;--deliverables-height:120px}
body{font-family:'Segoe UI',Arial,sans-serif;font-size:11px;background:#ECEFF1;padding:12px;color:#222}
.hdr{background:#fff;border:1px solid #ddd;border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:16px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.logo{width:46px;height:38px;background:#C0392B;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:11px;flex-shrink:0}
.htitle{font-size:16px;font-weight:800;color:#1A3A6B;text-transform:uppercase}
.hsub{font-size:10px;color:#777;margin-top:2px}
.toolbar{margin-left:auto;display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.toolbar button{padding:5px 10px;border:1px solid #ccc;background:#fff;border-radius:5px;cursor:pointer;font-size:10px;font-family:inherit}
.toolbar button:hover{background:#f0f0f0}
.toolbar button.primary{background:#1A5276;color:#fff;border-color:#1A5276}
.toolbar button.success{background:#1E8449;color:#fff;border-color:#1E8449}
.toolbar button.danger{background:#922B21;color:#fff;border-color:#922B21}
.hint{font-size:10px;color:#777;margin-bottom:8px;padding:0 2px}
.scroll{overflow-x:auto;padding-bottom:8px}
.row{display:flex;gap:6px;min-width:max-content}
.card{width:var(--card-width);border-radius:8px;border:1px solid #ddd;background:#fff;overflow:hidden;flex-shrink:0;display:flex;flex-direction:column;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ph{padding:8px 7px 7px;color:#fff;position:relative;height:var(--phase-header-height);min-height:var(--phase-header-height);overflow:hidden}
.pnum{font-size:32px;font-weight:900;opacity:.22;position:absolute;top:2px;left:5px;line-height:1;pointer-events:none}
.pname{font-size:10px;font-weight:800;text-transform:uppercase;padding-left:24px;line-height:1.3}
.psub{font-size:9px;opacity:.88;padding-left:24px;margin-top:3px;line-height:1.3}
[contenteditable]{outline:none;cursor:text}
[contenteditable]:focus{background:rgba(41,128,185,.08);border-radius:3px}
.pname:focus,.psub:focus{background:rgba(255,255,255,.18)}
.body{padding:7px;flex:1}
.lbl{font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.3px;color:#777;margin:7px 0 2px}
.lbl:first-child{margin-top:0}
.roleline{display:flex;align-items:center;gap:4px;margin-bottom:3px;flex-wrap:wrap}
.rbadge{display:inline-block;padding:2px 7px;border-radius:9px;font-size:9px;font-weight:700;border:.5px solid transparent}
.editbtn,.xbtn,.upbtn,.downbtn{border:none;background:none;cursor:pointer;font-size:12px;line-height:1;padding:0 2px;color:#777}
.editbtn:hover,.upbtn:hover,.downbtn:hover{color:#1A5276}
.xbtn{opacity:0;color:#e74c3c;font-weight:800}
.li:hover .xbtn,.roleline:hover .xbtn,.group:hover>.group-head .xbtn{opacity:1}
.desc-el{font-size:10px;color:#555;line-height:1.4;width:100%;display:block;border-bottom:1px dashed transparent}
.desc-el:hover,.li-text:hover{border-bottom-color:rgba(0,100,200,.25)}
.ul{list-style:none}
.li{display:flex;align-items:flex-start;gap:2px;padding:1.5px 0;font-size:10px;line-height:1.35;color:#333}
.li::before{content:"•";color:#aaa;flex-shrink:0}
.li-text{flex:1;border-bottom:1px dashed transparent;border-radius:2px;min-height:13px}
.addbtn{border:none;background:none;color:#888;cursor:pointer;font-size:10px;padding:2px 0;display:flex;align-items:center;gap:3px;width:100%;margin-top:1px;font-family:inherit}
.addbtn:hover{color:#1A5276}
.group{border-left:2px solid #ddd;padding-left:5px;margin-top:5px}
.group.primary-group{border-left-width:3px}
.group-head{display:flex;align-items:center;gap:4px;margin-bottom:1px}
.rglbl{font-size:9px;font-weight:800}
.role-tag{font-size:8px;color:#777;font-weight:700}
.delvs{background:#F8F9FA;margin:5px -7px -7px;padding:6px 7px;border-top:1px solid #eee;height:var(--deliverables-height);min-height:var(--deliverables-height);overflow:hidden;display:flex;flex-direction:column}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);align-items:center;justify-content:center;z-index:10}
.modal{background:#fff;border-radius:10px;padding:14px;width:420px;max-width:95vw;box-shadow:0 8px 30px rgba(0,0,0,.25)}
.modal h3{font-size:14px;color:#1A3A6B;margin-bottom:10px}
.modal label{display:block;font-size:10px;font-weight:700;margin-top:8px;color:#555}
.modal input,.modal select{width:100%;padding:7px;border:1px solid #ccc;border-radius:5px;font-family:inherit;font-size:11px;margin-top:3px}
.checkrow{display:flex;align-items:center;gap:7px;margin:5px 0;font-size:11px}
.checkrow input{width:auto;margin:0}
.roleRemoveBtn{border:none;background:none;color:#C0392B;cursor:pointer;font-weight:800;font-size:13px;padding:0 3px}.roleRemoveBtn:hover{color:#922B21}
.modal-actions{display:flex;gap:6px;justify-content:flex-end;margin-top:12px}
.modal-actions button{padding:6px 10px;border-radius:5px;border:1px solid #ccc;background:#fff;cursor:pointer}
.modal-actions button.primary{background:#1A5276;color:white;border-color:#1A5276}
.info{font-size:10px;color:#666;background:#F8F9FA;border:1px solid #eee;border-radius:6px;padding:7px;margin-top:8px;line-height:1.35}
@media print{
  body{background:#fff;padding:0}
  .toolbar,.hint{display:none}
  .hdr{box-shadow:none;border:none;border-bottom:2px solid #1A3A6B;border-radius:0;margin-bottom:8px}
  .scroll{overflow:visible}
  .row{flex-wrap:wrap;min-width:unset;gap:4px}
  .card{width:calc(20% - 4px);box-shadow:none;border:1px solid #ccc;page-break-inside:avoid}
  .xbtn,.addbtn,.editbtn,.upbtn,.downbtn{display:none}
}
</style>
</head>

{id:10,name:"Post-Projet",sub:"Retour d'expérience et amélioration continue",resp:"Vente externe",supp:["Vente interne","Administration"],desc:"Retour d'expérience et amélioration continue.",groups:[{role:"Vente externe",items:["Faire le retour d'expérience","Identifier les points d'amélioration","Alimenter les outils et processus"]},{role:"Vente interne",items:["Support au retour d'expérience"]},{role:"Administration",items:["Support documentaire"]}],dels:["Rapport retour d'expérience","Améliorations proposées"]},

const initialData=JSON.stringify(phases);

let cardWidth=Number(localStorage.getItem('serl_card_width')||205);
let headerHeight=Number(localStorage.getItem('serl_phase_header_height')||78);
function applyLayoutVars(){
  document.documentElement.style.setProperty('--card-width',cardWidth+'px');
  document.documentElement.style.setProperty('--phase-header-height',headerHeight+'px');
}
function changeCardWidth(delta){
  cardWidth=Math.max(170,Math.min(360,cardWidth+delta));
  localStorage.setItem('serl_card_width',cardWidth);
  applyLayoutVars();
}
function syncHeaderHeight(){
  const headers=[...document.querySelectorAll('.ph')];
  if(!headers.length)return;
  document.documentElement.style.setProperty('--phase-header-height','auto');
  let max=78;
  headers.forEach(h=>{max=Math.max(max,Math.ceil(h.scrollHeight));});
  headerHeight=max;
  localStorage.setItem('serl_phase_header_height',headerHeight);
  document.documentElement.style.setProperty('--phase-header-height',headerHeight+'px');
}

function syncDeliverablesHeight(){
  const sections=[...document.querySelectorAll('.delvs')];
  if(!sections.length)return;
  document.documentElement.style.setProperty('--deliverables-height','auto');
  let max=120;
  sections.forEach(s=>{max=Math.max(max,Math.ceil(s.scrollHeight));});
  document.documentElement.style.setProperty('--deliverables-height',max+'px');
  localStorage.setItem('serl_deliverables_height',max);
}

function mk(tag,cls){const e=document.createElement(tag);if(cls)e.className=cls;return e;}
function roleColor(role){
  if(!role)return "#666";
  if(!RC[role])RC[role]=nextUnusedColor();
  return RC[role];
}
function nextUnusedColor(){
  const used=new Set(Object.values(RC));
  const found=rolePalette.find(c=>!used.has(c));
  if(found)return found;
  const h=(Object.keys(RC).length*47)%360;
  return `hsl(${h},60%,38%)`;
}
function sortedRoles(){
  return [...roleOptions].sort((a,b)=>a.localeCompare(b,'fr',{sensitivity:'base'}));
}
function addRoleGlobal(role){
  const r=(role||"").trim();
  if(!r)return false;
  if(!roleOptions.includes(r))roleOptions.push(r);
  roleColor(r);
  roleOptions=sortedRoles();
  return true;
}
function removeRoleGlobal(role){
  if(!role)return;
  const used=phases.some(p=>p.resp===role || (Array.isArray(p.supp)&&p.supp.includes(role)) || (Array.isArray(p.groups)&&p.groups.some(g=>g.role===role)));
  if(used){
    alert("Ce rôle est utilisé dans au moins une phase. Retirez-le des phases avant de le supprimer de la liste.");
    return;
  }
  if(!confirm("Retirer ce rôle de la liste de sélection?"))return;
  roleOptions=roleOptions.filter(r=>r!==role);
  delete RC[role];
  const currentResp=document.getElementById('resp')?.value;
  if(currentResp) {
    const phaseNumber=document.querySelector('.modal h3')?.textContent?.match(/Phase (\d+)/);
    if(phaseNumber){
      const pIdx=Number(phaseNumber[1])-1;
      editPhaseRoles(pIdx);
    }
  }
}
function normalize(){
  roleOptions=sortedRoles();
  roleOptions.forEach(r=>roleColor(r));
  phases.forEach((p,i)=>{
    p.id=i+1;
    if(typeof p.supp==="string")p.supp=p.supp==="—"?[]:p.supp.split("+").map(x=>x.trim()).filter(Boolean);
    if(!Array.isArray(p.supp))p.supp=[];
    if(!Array.isArray(p.groups))p.groups=[];
    if(!Array.isArray(p.dels))p.dels=[];
    if(!p.supportPriority)p.supportPriority={};
    p.supp.forEach((r,idx)=>{
      if(!p.supportPriority[r])p.supportPriority[r]=idx+1;
    });
    Object.keys(p.supportPriority).forEach(r=>{
      if(!p.supp.includes(r))delete p.supportPriority[r];
    });
    syncGroups(p);
  });
}
function orderedSupports(p){
  return [...p.supp]
    .filter(r=>r!==p.resp)
    .sort((a,b)=>{
      const pa=Number(p.supportPriority?.[a]||999);
      const pb=Number(p.supportPriority?.[b]||999);
      if(pa!==pb)return pa-pb;
      return a.localeCompare(b);
    });
}
function syncGroups(p){
  if(!p.supportPriority)p.supportPriority={};
  const supports=orderedSupports(p);
  const orderedRoles=[p.resp,...supports];
  const existing={};
  p.groups.forEach(g=>{ if(g.role && !existing[g.role]) existing[g.role]=g; });
  const newGroups=[];
  orderedRoles.forEach(r=>{
    if(existing[r]) newGroups.push(existing[r]);
    else newGroups.push({role:r,items:["Nouvelle responsabilité"]});
  });
  p.groups.forEach(g=>{
    if(!orderedRoles.includes(g.role)) newGroups.push(g);
  });
  p.groups=newGroups;
}
function renderAll(){const row=document.getElementById('row');row.innerHTML='';phases.forEach((_,i)=>row.appendChild(renderCard(i)));applyLayoutVars();setTimeout(()=>{syncHeaderHeight();syncDeliverablesHeight();},0);}
function saveLocal(){localStorage.setItem('serl_pipeline_data_v3',JSON.stringify(phases));alert('Sauvegarde locale effectuée.');}
function loadLocal(){const d=localStorage.getItem('serl_pipeline_data_v3'); if(!d){alert('Aucune sauvegarde locale trouvée.');return;} phases=JSON.parse(d); normalize(); renderAll();}
function resetData(){if(confirm('Réinitialiser les données de l’application?')){phases=JSON.parse(initialData);applyLayoutVars();normalize();renderAll();}}

function editable(el,get,set){
  el.contentEditable='true';el.textContent=get();
  el.addEventListener('blur',()=>{const v=el.textContent.trim(); if(v)set(v); else el.textContent=get();});
  el.addEventListener('keydown',ev=>{if(ev.key==='Enter'&&!ev.shiftKey){ev.preventDefault();el.blur();} if(ev.key==='Escape'){el.textContent=get();el.blur();}});
  return el;
}
function badge(role){
  if(!role)return document.createTextNode("—");
  const c=roleColor(role); const s=mk('span','rbadge');
  s.style.cssText=`background:${c}18;color:${c};border-color:${c}35`; s.textContent=role; return s;
}
function buildLi(text,onDel,onChange){
  const li=mk('li','li'); const txt=mk('span','li-text'); editable(txt,()=>text,v=>onChange(v));
  const x=mk('button','xbtn');x.textContent='×';x.title='Supprimer';x.onclick=onDel;
  li.appendChild(txt);li.appendChild(x); return li;
}
function replaceCard(pIdx){syncGroups(phases[pIdx]); const row=document.getElementById('row'); const old=row.children[pIdx]; if(old)row.replaceChild(renderCard(pIdx),old);applyLayoutVars();setTimeout(()=>{syncHeaderHeight();syncDeliverablesHeight();},0);}
function movePhase(i,dir){const j=i+dir;if(j<0||j>=phases.length)return;[phases[i],phases[j]]=[phases[j],phases[i]];applyLayoutVars();normalize();renderAll();}
function deletePhase(i){if(confirm('Supprimer cette phase?')){phases.splice(i,1);applyLayoutVars();normalize();renderAll();}}
function addPhase(){phases.push({id:phases.length+1,name:"Nouvelle phase",sub:"Sous-titre",resp:"Vente externe",supp:[],desc:"Description de la phase.",groups:[{role:"Vente externe",items:["Nouvelle responsabilité"]}],dels:["Nouveau livrable"]});applyLayoutVars();normalize();renderAll();}

function renderCard(pIdx){
  const ph=phases[pIdx]; syncGroups(ph);
  const card=mk('div','card'); const update=()=>replaceCard(pIdx);
  const hdr=mk('div','ph'); hdr.style.background=PC[pIdx%PC.length];
  const pn=mk('div','pnum');pn.textContent=ph.id;
  const nm=mk('div','pname');editable(nm,()=>ph.name,v=>{ph.name=v;setTimeout(syncHeaderHeight,0);});
  const sb=mk('div','psub');editable(sb,()=>ph.sub,v=>{ph.sub=v;setTimeout(syncHeaderHeight,0);});
  hdr.append(pn,nm,sb); card.appendChild(hdr);

  const body=mk('div','body');
  const controls=mk('div','roleline');
  const up=mk('button','upbtn');up.textContent='←';up.title='Déplacer à gauche';up.onclick=()=>movePhase(pIdx,-1);
  const down=mk('button','downbtn');down.textContent='→';down.title='Déplacer à droite';down.onclick=()=>movePhase(pIdx,1);
  const del=mk('button','xbtn');del.textContent='×';del.style.opacity=.7;del.onclick=()=>deletePhase(pIdx);
  controls.append(up,down,del); body.appendChild(controls);

  let l=mk('div','lbl');l.textContent='Responsable principal';body.appendChild(l);
  let line=mk('div','roleline');line.appendChild(badge(ph.resp));let eb=mk('button','editbtn');eb.textContent='✎';eb.onclick=()=>editPhaseRoles(pIdx);line.appendChild(eb);body.appendChild(line);

  l=mk('div','lbl');l.textContent='Support';body.appendChild(l);
  line=mk('div','roleline');
  const os=orderedSupports(ph);
  if(os.length===0)line.appendChild(document.createTextNode('—'));
  os.forEach(r=>{
    const wrap=mk('span');
    wrap.appendChild(badge(r));
    const pr=mk('span','role-tag');
    pr.textContent=' S'+(ph.supportPriority?.[r]||'');
    wrap.appendChild(pr);
    line.appendChild(wrap);
  });
  eb=mk('button','editbtn');eb.textContent='✎';eb.onclick=()=>editPhaseRoles(pIdx);line.appendChild(eb);body.appendChild(line);

  l=mk('div','lbl');l.textContent='Description';body.appendChild(l);
  const dc=mk('div','desc-el');editable(dc,()=>ph.desc,v=>{ph.desc=v;});body.appendChild(dc);

  l=mk('div','lbl');l.textContent='Responsabilités clés';body.appendChild(l);
  ph.groups.forEach((g,gi)=>{
    const isPrimary = g.role === ph.resp;
    const div=mk('div','group' + (isPrimary ? ' primary-group' : '')); 
    div.style.borderLeftColor=roleColor(g.role);
    const gh=mk('div','group-head');
    const rl=mk('div','rglbl');rl.style.color=roleColor(g.role);rl.textContent=(g.role||'Général')+' :';
    const tag=mk('span','role-tag');
    tag.textContent=isPrimary?'Responsable principal':(ph.supp.includes(g.role)?'Support '+(ph.supportPriority?.[g.role]||''):'Autre');
    const x=mk('button','xbtn');x.textContent='×';x.title='Retirer ce groupe de responsabilités';
    x.onclick=()=>{
      if(g.role===ph.resp || ph.supp.includes(g.role)){
        alert('Ce groupe est lié au responsable principal ou aux supports. Retirez d’abord ce rôle dans la liste de choix.');
        return;
      }
      ph.groups.splice(gi,1);update();
    };
    gh.append(rl,tag,x);div.appendChild(gh);
    const ul=mk('ul','ul');
    g.items.forEach((item,ii)=>ul.appendChild(buildLi(item,()=>{g.items.splice(ii,1);update();},v=>{g.items[ii]=v;})));
    div.appendChild(ul);
    const add=mk('button','addbtn');add.textContent='+ ajouter responsabilité';add.onclick=()=>{g.items.push('Nouvelle responsabilité');update();};div.appendChild(add);
    body.appendChild(div);
  });
  card.appendChild(body);

  const dv=mk('div','delvs');
  l=mk('div','lbl');l.textContent='Livrables / Sorties clés';dv.appendChild(l);
  const dul=mk('ul','ul');
  ph.dels.forEach((d,di)=>dul.appendChild(buildLi(d,()=>{ph.dels.splice(di,1);update();},v=>{ph.dels[di]=v;})));
  dv.appendChild(dul);
  const addD=mk('button','addbtn');addD.textContent='+ ajouter livrable';addD.onclick=()=>{ph.dels.push('Nouveau livrable');update();};dv.appendChild(addD);
  card.appendChild(dv);
  return card;
}

function openModal(html){document.getElementById('modal').innerHTML=html;document.getElementById('modalBg').style.display='flex';}
function closeModal(){document.getElementById('modalBg').style.display='none';}
function roleSelect(id,val){
  return `<select id="${id}">${sortedRoles().map(r=>`<option ${r===val?'selected':''}>${r}</option>`).join('')}</select>`;
}

function editPhaseRoles(pIdx){
  const p=phases[pIdx];
  if(!p.supportPriority)p.supportPriority={};
  const supportsHtml=roleOptions.map(r=>{
    const disabled = r===p.resp ? "disabled" : "";
    const checked = p.supp.includes(r) ? "checked" : "";
    const priority = p.supportPriority[r] || "";
    return `<div class="checkrow">
      <input type="checkbox" class="supportCheck" value="${r}" ${checked} ${disabled} onchange="togglePriorityInput(this)">
      <span style="flex:1">${r}${r===p.resp?' — responsable principal':''}</span>
      <label style="margin:0;font-size:9px;color:#666">Priorité</label>
      <input type="number" class="supportPriority" data-role="${r}" min="1" step="1" value="${priority}" ${checked&&!disabled?'':'disabled'} style="width:64px;margin:0;padding:4px">
    </div>`;
  }).join('');
  openModal(`<h3>Modifier responsable principal et supports — Phase ${p.id}</h3>
    <label>Responsable principal — sélection unique</label>
    ${roleSelect('resp',p.resp)}
    <label>Supports — sélection multiple avec priorité</label>
    <div id="supportList">${supportsHtml}</div>
    <label>Ajouter un nouveau rôle disponible</label>
    <input id="newRole" placeholder="Ex. Chargé de projet">
    <div class="info">Règle appliquée : le responsable principal reste toujours en premier. Les supports sont placés dessous selon la priorité indiquée : Support 1, Support 2, Support 3, etc.</div>
    <div class="modal-actions"><button onclick="closeModal()">Annuler</button><button class="primary" onclick="savePhaseRoles(${pIdx})">Sauvegarder</button></div>`);
  document.getElementById('resp').addEventListener('change',()=>refreshSupportCheckboxes());
}
function togglePriorityInput(cb){
  const input=document.querySelector(`.supportPriority[data-role="${cb.value}"]`);
  if(input){
    input.disabled=!cb.checked;
    if(cb.checked && !input.value){
      const checkedCount=[...document.querySelectorAll('.supportCheck:checked')].length;
      input.value=checkedCount;
    }
  }
}
function refreshSupportCheckboxes(){
  const selectedResp=document.getElementById('resp').value;
  document.querySelectorAll('.supportCheck').forEach(cb=>{
    cb.disabled = cb.value===selectedResp;
    if(cb.disabled) cb.checked=false;
    togglePriorityInput(cb);
  });
}
function savePhaseRoles(pIdx){
  const nr=document.getElementById('newRole').value.trim();
  if(nr)addRoleGlobal(nr);
  const resp=document.getElementById('resp').value;
  const checked=[...document.querySelectorAll('.supportCheck:checked')].filter(cb=>cb.value!==resp);
  const priorityMap={};
  checked.forEach((cb,idx)=>{
    const input=document.querySelector(`.supportPriority[data-role="${cb.value}"]`);
    const val=Number(input?.value||idx+1);
    priorityMap[cb.value]=val>0?val:idx+1;
  });
  const supp=checked.map(cb=>cb.value).sort((a,b)=>{
    const pa=Number(priorityMap[a]||999);
    const pb=Number(priorityMap[b]||999);
    if(pa!==pb)return pa-pb;
    return a.localeCompare(b);
  });
  phases[pIdx].resp=resp;
  phases[pIdx].supp=supp;
  phases[pIdx].supportPriority=priorityMap;
  syncGroups(phases[pIdx]);
  closeModal();
  replaceCard(pIdx);
}
function exportJSON(){
  normalize();
  const blob=new Blob([JSON.stringify(phases,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='SERL_Pipeline_'+new Date().toISOString().slice(0,10)+'.json'; a.click();
}
function importJSON(e){
  const file=e.target.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(Array.isArray(data)&&data.length){phases=data;applyLayoutVars();normalize();renderAll();}
      else alert('Format JSON invalide.');
    }catch(err){alert('Erreur de lecture JSON.');}
  };
  reader.readAsText(file); e.target.value='';
}
document.getElementById('modalBg').addEventListener('click',e=>{if(e.target.id==='modalBg')closeModal();});
applyLayoutVars();normalize();renderAll();
</script>
